<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Snake — Стены + Орбы</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .score-card {
            background: #0f1117;
            border-radius: 24px;
            padding: 12px 24px;
            text-align: center;
            flex: 1;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
        }

        .score-label {
            color: #5a6e8a;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .score-value {
            color: #2ecc71;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 5px #2ecc7140;
            line-height: 1;
        }

        .best .score-value {
            color: #f39c12;
            text-shadow: 0 0 5px #f39c1240;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #07090e;
            border-radius: 24px;
            box-shadow: 0 0 0 2px #1e2432, inset 0 0 0 2px #000;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 0 #0b0e12;
        }

        .mode-btn.active {
            background: #2ecc71;
            color: #0a0c12;
            box-shadow: 0 0 10px #2ecc71;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #0b0e12;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }

        .swipe-area {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.6;
        }

        .swipe-hint {
            background: #0f1117;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #5a6e8a;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            color: #e67e22;
            font-weight: bold;
            font-size: 18px;
            background: #0f1117;
            padding: 8px;
            border-radius: 60px;
        }

        @media (max-width: 600px) {
            .game-container { padding: 12px; }
            .score-value { font-size: 28px; }
            button { padding: 8px 20px; font-size: 14px; }
            .mode-btn { font-size: 11px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <div class="score-board">
                <div class="score-card">
                    <div class="score-label">СЧЁТ</div>
                    <div class="score-value" id="currentScore">0</div>
                </div>
                <div class="score-card best">
                    <div class="score-label">РЕКОРД</div>
                    <div class="score-value" id="bestScore">0</div>
                </div>
            </div>

            <div class="mode-selector">
                <button class="mode-btn" data-mode="classic">🟢 КЛАССИКА</button>
                <button class="mode-btn" data-mode="walls">🟠 СТЕНЫ</button>
                <button class="mode-btn" data-mode="orbs_walls" id="activeMode">🔵 ОРБЫ+СТЕНЫ</button>
            </div>

            <canvas id="snakeCanvas" width="500" height="500"></canvas>

            <div class="controls">
                <button id="newGameBtn">🐍 НОВАЯ ИГРА</button>
            </div>

            <div class="swipe-area">
                <div class="swipe-hint">⬆️ ⬇️ ⬅️ ➡️</div>
                <div class="swipe-hint">👆 СВАЙПЫ</div>
            </div>
            <div class="status" id="gameStatus">▶ ИГРА</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ========== НАСТРОЙКИ ==========
        const BOARD_SIZE = 20;
        const CELL_SIZE = 25;
        const TICK_INTERVAL_MS = 140;
        const ORB_LIFESPAN_MS = 3000;

        let currentMode = "orbs_walls";
        
        let walls = [];
        let orbTimeout = null;
        let currentOrbActive = false;
        
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreSpan = document.getElementById('currentScore');
        const bestScoreSpan = document.getElementById('bestScore');
        const gameStatusSpan = document.getElementById('gameStatus');
        
        let snake = [];
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let food = { x: 12, y: 10 };
        let isDoubleOrb = false;
        let score = 0;
        let bestScore = 0;
        let gameLoop = null;
        let gameActive = true;
        
        let audioCtx = null;
        let eatSoundBuffer = null;
        let doubleEatSoundBuffer = null;
        let crashSoundBuffer = null;
        let orbDisappearBuffer = null;
        
        // ========== ЗВУКИ ==========
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                createEatSound();
                createDoubleEatSound();
                createCrashSound();
                createOrbDisappearSound();
            } catch(e) { console.log("Web Audio не поддерживается"); }
        }
        
        function createEatSound() {
            if (!audioCtx) return;
            const duration = 0.12;
            const sampleRate = audioCtx.sampleRate;
            const frameCount = sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frameCount; i++) {
                let t = i / sampleRate;
                let freq = 880 + t * 200;
                data[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 15);
            }
            eatSoundBuffer = buffer;
        }
        
        function createDoubleEatSound() {
            if (!audioCtx) return;
            const duration = 0.2;
            const sampleRate = audioCtx.sampleRate;
            const frameCount = sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frameCount; i++) {
                let t = i / sampleRate;
                let freq = 440 + t * 400;
                data[i] = Math.sin(2 * Math.PI * freq * t) * Math.sin(2 * Math.PI * 2 * freq * t) * 0.5 * Math.exp(-t * 8);
            }
            doubleEatSoundBuffer = buffer;
        }
        
        function createCrashSound() {
            if (!audioCtx) return;
            const duration = 0.3;
            const sampleRate = audioCtx.sampleRate;
            const frameCount = sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frameCount; i++) {
                let t = i / sampleRate;
                let noise = (Math.random() - 0.5) * 2;
                let envelope = Math.exp(-t * 12);
                data[i] = noise * envelope * 0.8;
            }
            crashSoundBuffer = buffer;
        }
        
        function createOrbDisappearSound() {
            if (!audioCtx) return;
            const duration = 0.25;
            const sampleRate = audioCtx.sampleRate;
            const frameCount = sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frameCount; i++) {
                let t = i / sampleRate;
                let freq = 660 * Math.exp(-t * 8);
                data[i] = Math.sin(2 * Math.PI * freq * t) * (1 - t/duration);
            }
            orbDisappearBuffer = buffer;
        }
        
        function playEatSound(isDouble = false) {
            if (!audioCtx) return;
            const source = audioCtx.createBufferSource();
            source.buffer = isDouble ? doubleEatSoundBuffer : eatSoundBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }
        
        function playCrashSound() {
            if (!audioCtx || !crashSoundBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = crashSoundBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }
        
        function playOrbDisappearSound() {
            if (!audioCtx || !orbDisappearBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = orbDisappearBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }
        
        function unlockAudio() {
            if (audioCtx && audioCtx.state !== 'running') {
                audioCtx.resume();
            }
        }
        document.body.addEventListener('click', unlockAudio);
        document.body.addEventListener('touchstart', unlockAudio);
        
        // ========== РЕКОРД ==========
        function loadBestScore() {
            try {
                const saved = localStorage.getItem('memuars_snake_best');
                if (saved !== null) {
                    bestScore = parseInt(saved, 10);
                    if (isNaN(bestScore)) bestScore = 0;
                }
                bestScoreSpan.innerText = bestScore;
            } catch(e) {}
        }
        
        function saveBestScore() {
            if (score > bestScore) {
                bestScore = score;
                bestScoreSpan.innerText = bestScore;
                try {
                    localStorage.setItem('memuars_snake_best', bestScore);
                } catch(e) {}
            }
        }
        
        // ========== СТЕНЫ (цельные блоки) ==========
        function isNearSnake(x, y, distance = 3) {
            for (let seg of snake) {
                if (Math.abs(seg.x - x) <= distance && Math.abs(seg.y - y) <= distance) {
                    return true;
                }
            }
            return false;
        }
        
        function generateWalls() {
            if (currentMode === "classic") {
                walls = [];
                return;
            }
            
            walls = [];
            const wallBlocks = [
                { w: 2, h: 2 }, { w: 2, h: 3 }, { w: 3, h: 2 }, { w: 2, h: 2 },
                { w: 3, h: 3 }, { w: 2, h: 2 }, { w: 2, h: 3 }, { w: 3, h: 2 }
            ];
            
            let totalWallCells = 0;
            const maxWallCells = 36;
            
            for (let attempt = 0; attempt < 30 && totalWallCells < maxWallCells; attempt++) {
                const block = wallBlocks[Math.floor(Math.random() * wallBlocks.length)];
                const startX = Math.floor(Math.random() * (BOARD_SIZE - block.w));
                const startY = Math.floor(Math.random() * (BOARD_SIZE - block.h));
                
                let valid = true;
                for (let dx = 0; dx < block.w; dx++) {
                    for (let dy = 0; dy < block.h; dy++) {
                        const x = startX + dx;
                        const y = startY + dy;
                        if (isNearSnake(x, y, 2)) valid = false;
                        if (food && x === food.x && y === food.y) valid = false;
                        if (x >= 7 && x <= 13 && y >= 7 && y <= 13) valid = false;
                    }
                }
                
                if (valid) {
                    for (let dx = 0; dx < block.w; dx++) {
                        for (let dy = 0; dy < block.h; dy++) {
                            const x = startX + dx;
                            const y = startY + dy;
                            if (!walls.some(w => w.x === x && w.y === y)) {
                                walls.push({ x, y });
                                totalWallCells++;
                            }
                        }
                    }
                }
            }
        }
        
        // ========== ЕДА / ОРБЫ ==========
        function clearOrbTimer() {
            if (orbTimeout) {
                clearTimeout(orbTimeout);
                orbTimeout = null;
            }
        }
        
        function removeOrb() {
            if (currentOrbActive && gameActive) {
                currentOrbActive = false;
                isDoubleOrb = false;
                playOrbDisappearSound();
                generateNormalFood();
                drawCanvas();
            }
        }
        
        function generateNormalFood() {
            const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
            const wallSet = new Set(walls.map(w => `${w.x},${w.y}`));
            
            let freeCells = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const key = `${i},${j}`;
                    if (!snakeSet.has(key) && !wallSet.has(key)) {
                        freeCells.push({ x: i, y: j });
                    }
                }
            }
            
            if (freeCells.length > 0) {
                const rand = Math.floor(Math.random() * freeCells.length);
                food = freeCells[rand];
            }
            isDoubleOrb = false;
            currentOrbActive = false;
        }
        
        function generateValidFood() {
            const totalCells = BOARD_SIZE * BOARD_SIZE;
            const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
            const wallSet = new Set(walls.map(w => `${w.x},${w.y}`));
            
            if (snake.length >= totalCells - walls.length) {
                gameActive = false;
                if (gameLoop) clearInterval(gameLoop);
                gameStatusSpan.innerHTML = "🏆 ПОБЕДА! 🏆";
                gameStatusSpan.style.color = "#f1c40f";
                saveBestScore();
                drawCanvas();
                return;
            }
            
            let freeCells = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const key = `${i},${j}`;
                    if (!snakeSet.has(key) && !wallSet.has(key)) {
                        freeCells.push({ x: i, y: j });
                    }
                }
            }
            
            if (freeCells.length === 0) {
                gameActive = false;
                if (gameLoop) clearInterval(gameLoop);
                gameStatusSpan.innerHTML = "🏆 ПОБЕДА! 🏆";
                gameStatusSpan.style.color = "#f1c40f";
                saveBestScore();
                drawCanvas();
                return;
            }
            
            const rand = Math.floor(Math.random() * freeCells.length);
            food = freeCells[rand];
            
            if (currentMode === "orbs_walls") {
                const orbChance = Math.random() < 0.1;
                if (orbChance) {
                    isDoubleOrb = true;
                    currentOrbActive = true;
                    clearOrbTimer();
                    orbTimeout = setTimeout(() => {
                        removeOrb();
                    }, ORB_LIFESPAN_MS);
                } else {
                    isDoubleOrb = false;
                    currentOrbActive = false;
                }
            } else {
                isDoubleOrb = false;
                currentOrbActive = false;
            }
        }
        
        // ========== ДВИЖЕНИЕ ==========
        function moveSnake() {
            if (!gameActive) return false;
            
            direction = nextDirection;
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT': newHead.x -= 1; break;
                case 'UP': newHead.y -= 1; break;
                case 'DOWN': newHead.y += 1; break;
            }
            
            if (currentMode !== "classic") {
                const hitWall = walls.some(w => w.x === newHead.x && w.y === newHead.y);
                if (hitWall) return false;
            }
            
            if (newHead.x < 0 || newHead.x >= BOARD_SIZE || newHead.y < 0 || newHead.y >= BOARD_SIZE) {
                return false;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            const growAmount = (willEat && isDoubleOrb) ? 2 : 1;
            
            if (willEat) {
                if (isDoubleOrb && currentOrbActive) {
                    clearOrbTimer();
                    currentOrbActive = false;
                }
                
                snake.unshift(newHead);
                if (growAmount === 2) {
                    const tail = snake[snake.length-1];
                    snake.push({ ...tail });
                    score += 2;
                    playEatSound(true);
                } else {
                    score++;
                    playEatSound(false);
                }
                currentScoreSpan.innerText = score;
                saveBestScore();
                generateValidFood();
            } else {
                snake.unshift(newHead);
                snake.pop();
            }
            
            const head = snake[0];
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return false;
                }
            }
            
            return true;
        }
        
        // ========== ИГРОВОЙ ТИК ==========
        function gameTick() {
            if (!gameActive) return;
            const success = moveSnake();
            drawCanvas();
            if (!success) {
                gameActive = false;
                if (gameLoop) clearInterval(gameLoop);
                playCrashSound();
                gameStatusSpan.innerHTML = "💀 GAME OVER 💀";
                gameStatusSpan.style.color = "#e74c3c";
                saveBestScore();
                drawCanvas();
            }
        }
        
        // ========== ОТРИСОВКА ==========
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#1a202c';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= BOARD_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            if (currentMode !== "classic") {
                for (let w of walls) {
                    ctx.fillStyle = '#4a5b6e';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(w.x * CELL_SIZE + 2, w.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    ctx.fillStyle = '#2c3e50';
                    ctx.fillRect(w.x * CELL_SIZE + 4, w.y * CELL_SIZE + 4, CELL_SIZE - 8, CELL_SIZE - 8);
                }
            }
            
            if (isDoubleOrb && currentMode === "orbs_walls" && currentOrbActive) {
                const pulse = (Date.now() % 500) / 500;
                ctx.fillStyle = `rgba(243, 156, 18, ${0.6 + pulse * 0.4})`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#f39c12';
                ctx.fillRect(food.x * CELL_SIZE + 1, food.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(food.x * CELL_SIZE + 4, food.y * CELL_SIZE + 4, CELL_SIZE - 8, CELL_SIZE - 8);
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${CELL_SIZE-8}px monospace`;
                ctx.fillText("2", food.x * CELL_SIZE + 8, food.y * CELL_SIZE + 20);
            } else {
                ctx.fillStyle = '#e67e22';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#e67e22';
                ctx.fillRect(food.x * CELL_SIZE + 1, food.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(food.x * CELL_SIZE + 3, food.y * CELL_SIZE + 3, CELL_SIZE - 6, CELL_SIZE - 6);
            }
            ctx.shadowBlur = 0;
            
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const grad = ctx.createLinearGradient(seg.x * CELL_SIZE, seg.y * CELL_SIZE, (seg.x+1)*CELL_SIZE, (seg.y+1)*CELL_SIZE);
                if (i === 0) {
                    grad.addColorStop(0, '#2ecc71');
                    grad.addColorStop(1, '#27ae60');
                } else {
                    grad.addColorStop(0, '#2ecc71cc');
                    grad.addColorStop(1, '#1e8a4ccc');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                if (i === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(seg.x * CELL_SIZE + CELL_SIZE * 0.7, seg.y * CELL_SIZE + CELL_SIZE * 0.35, 3, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(seg.x * CELL_SIZE + CELL_SIZE * 0.7, seg.y * CELL_SIZE + CELL_SIZE * 0.35, 1.2, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
            
            if (!gameActive) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                let msg = "GAME OVER";
                if (snake.length === BOARD_SIZE*BOARD_SIZE - walls.length) msg = "PERFECT WIN!";
                ctx.fillText(msg, canvas.width/2 - ctx.measureText(msg).width/2, canvas.height/2);
            }
        }
        
        // ========== УПРАВЛЕНИЕ ==========
        function changeDirection(newDir) {
            if (!gameActive) return;
            const opposite = { 'UP':'DOWN','DOWN':'UP','LEFT':'RIGHT','RIGHT':'LEFT' };
            if (opposite[newDir] !== direction) {
                nextDirection = newDir;
            }
        }
        
        function handleKeydown(e) {
            const key = e.key;
            if (key === 'ArrowUp') changeDirection('UP');
            else if (key === 'ArrowDown') changeDirection('DOWN');
            else if (key === 'ArrowLeft') changeDirection('LEFT');
            else if (key === 'ArrowRight') changeDirection('RIGHT');
            else if (key === ' ' || key === 'Space') {
                if (!gameActive) newGame();
                e.preventDefault();
            }
        }
        
        let touchStart = null;
        function handleTouchStart(e) {
            e.preventDefault();
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        
        function handleTouchEnd(e) {
            if (!touchStart) return;
            e.preventDefault();
            const diffX = e.changedTouches[0].clientX - touchStart.x;
            const diffY = e.changedTouches[0].clientY - touchStart.y;
            if (Math.abs(diffX) < 15 && Math.abs(diffY) < 15) return;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) changeDirection('RIGHT');
                else changeDirection('LEFT');
            } else {
                if (diffY > 0) changeDirection('DOWN');
                else changeDirection('UP');
            }
            touchStart = null;
        }
        
        function newGame() {
            if (gameLoop) clearInterval(gameLoop);
            clearOrbTimer();
            
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameActive = true;
            currentScoreSpan.innerText = "0";
            gameStatusSpan.innerHTML = "▶ ИГРА";
            gameStatusSpan.style.color = "#2ecc71";
            
            food = { x: 15, y: 10 };
            isDoubleOrb = false;
            currentOrbActive = false;
            
            if (currentMode !== "classic") {
                generateWalls();
            } else {
                walls = [];
            }
            
            generateValidFood();
            drawCanvas();
            gameLoop = setInterval(gameTick, TICK_INTERVAL_MS);
        }
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.dataset.mode === mode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            newGame();
        }
        
        // ========== СТАРТ ==========
        function setupEvents() {
            window.addEventListener('keydown', handleKeydown);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            document.getElementById('newGameBtn').addEventListener('click', () => newGame());
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });
        }
        
        function start() {
            loadBestScore();
            initAudio();
            setupEvents();
            setMode("orbs_walls");
        }
        
        start();
    })();
</script>
</body>
</html>
